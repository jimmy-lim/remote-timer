services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bun", "run", "api.ts"]
    environment:
      PORT: "3001"
      DATA_PATH: "/data/timer-data.json"
    volumes:
      - ./data:/data
    ports:
      - "3001:3001"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bun", "run", "ui.ts"]
    environment:
      PORT: "3000"
      API_BASE_URL: "http://api:3001"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
